<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>إستعلاماتي</title>
    <style>
        :root { --primary: #0d6efd; --bg: #f4f7f6; --brand-color: #0d47a1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; background: var(--bg); padding: 20px; text-align: center; color: #333; }
        .container { max-width: 450px; margin: 20px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .brand-section { margin-bottom: 25px; }
        .brand-name { font-size: 35px; font-weight: 900; color: var(--brand-color); display: block; line-height: 1.2; }
        .brand-dot { color: #dc3545; }
        .sub-brand { font-size: 14px; color: #777; }
        h2 { font-size: 1.2rem; margin-bottom: 25px; color: #555; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { display: block; text-align: right; margin-top: 15px; font-weight: 600; font-size: 0.9em; }
        select, input { width: 100%; padding: 14px; margin-top: 5px; border: 2px solid #f0f0f0; border-radius: 12px; box-sizing: border-box; font-size: 16px; text-align: right; outline: none; }
        button { width: 100%; padding: 15px; margin-top: 25px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-search { background: var(--primary); color: white; }
        .resultBox { display: none; text-align: right; }
        .data-card { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-top: 15px; border-right: 6px solid var(--primary); }
        .amount-text { color: #dc3545; font-size: 1.6em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="searchPage">
    <div class="brand-section">
        <span class="brand-name">إستعلاماتي<span class="brand-dot">.</span></span>
        <span class="sub-brand">بوابة الخدمات الإلكترونية الموحدة</span>
    </div>
    
    <h2>استعلام عن الفاتورة</h2>
    
    <label>نوع الخدمة</label>
    <select id="type" onchange="updateBranches()">
        <option value="">-- اختر النوع --</option>
        <option value="Electricity">فاتورة الكهرباء</option>
        <option value="Water">فاتورة المياه</option>
    </select>

    <label>الفرع المحلي</label>
    <select id="branch"><option value="">اختر النوع أولاً</option></select>

    <label id="idLabel">رقم المشترك</label>
    <input type="text" id="subId" placeholder="أدخل الرقم هنا" inputmode="numeric">

    <button class="btn-search" onclick="searchBill()">استعلام الآن</button>
</div>

<div class="container resultBox" id="resultPage">
    <div class="brand-section"><span class="brand-name" style="font-size: 25px;">إستعلاماتي</span></div>
    <h2>نتيجة الاستعلام</h2>
    <div class="data-card">
        <p><small style="color:#888;">الاسم الكامل:</small><br><b id="custName"></b></p>
        <p><small style="color:#888;">المبلغ المستحق للدفع:</small><br><span class="amount-text" id="custAmount"></span> <small>ريال</small></p>
    </div>
    <button class="btn-search" style="background:#6c757d;" onclick="location.reload()">بحث جديد</button>
</div>

<script>
    const BASE_DB = "https://question-738f7-default-rtdb.firebaseio.com/Bills";

    function updateBranches() {
        const type = document.getElementById("type").value;
        const branchSelect = document.getElementById("branch");
        branchSelect.innerHTML = '<option value="">-- اختر الفرع --</option>';
        
        let list = [];
        if (type === "Electricity") {
            // فروع الكهرباء بناءً على سياق العمل السابق
            list = ["حضرموت الوادي والصحراء", "حضرموت ساحل"];
        } else if (type === "Water") {
            // قائمة الفروع كاملة كما ظهرت في الصورة المرفقة
            list = [
                "فرع الشحر", 
                "فرع سيؤن", 
                "فرع ساه", 
                "فرع شبام", 
                "فرع القطن", 
                "فرع المكلا", 
                "فرع الديس الشرقية", 
                "فرع تريم", 
                "فرع الريدة وقصيعر", 
                "فرع ميفع وحجر", 
                "فرع غيل باوزير"
            ];
        }

        list.forEach(b => {
            let opt = document.createElement("option");
            opt.value = b; opt.innerText = b;
            branchSelect.appendChild(opt);
        });
    }

    async function searchBill() {
        const type = document.getElementById("type").value;
        const branch = document.getElementById("branch").value;
        const id = document.getElementById("subId").value.trim();
        
        if (!type || !branch || !id) return alert("يرجى إكمال جميع الحقول");

        const apiPath = `${BASE_DB}/${encodeURIComponent(type)}/${encodeURIComponent(branch)}/${id}.json`;

        try {
            const response = await fetch(apiPath);
            const resultData = await response.json();
            if (!resultData) return alert("لم يتم العثور على بيانات.");

            document.getElementById("custName").innerText = resultData.customerName || "غير متوفر";
            document.getElementById("custAmount").innerText = resultData.amount || "0";
            document.getElementById("searchPage").style.display = "none";
            document.getElementById("resultPage").style.display = "block";
        } catch (error) {
            alert("خطأ في الاتصال بالخادم.");
        }
    }
</script>
</body>
</html>
