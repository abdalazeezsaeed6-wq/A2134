<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>إستعلاماتي - نظام استعلام الفواتير</title>
    <style>
        :root { --primary: #0d6efd; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 20px; color: var(--text); }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        /* تنسيق الشعار ليظهر بشكل ممتاز في منتصف الصفحة */
        .logo { width: 180px; height: auto; margin-bottom: 15px; border-radius: 10px; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 14px; margin-top: 20px; border: none; border-radius: 8px; font-size: 17px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-search { background: var(--primary); color: white; }
        .btn-gray { background: #6c757d; color: white; }
        .resultBox { display: none; text-align: right; }
        .data-row { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 10px; border-right: 5px solid var(--primary); }
        .amount { color: #dc3545; font-size: 1.4em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="searchPage">
    <div class="header">
        <img src="https://i.ibb.co/3M6r9f4/my-inquiries-logo.png" alt="شعار إستعلاماتي" class="logo">
    </div>
    <h2>استعلام الفاتورة</h2>
    
    <label>نوع الخدمة</label>
    <select id="type" onchange="updateBranches()">
        <option value="">-- اختر نوع الفاتورة --</option>
        <option value="Electricity">فاتورة الكهرباء</option>
        <option value="Water">فاتورة الماء</option>
    </select>

    <label>الفرع المحلي</label>
    <select id="branch">
        <option value="">اختر النوع أولاً</option>
    </select>

    <label>رقم المشترك</label>
    <input type="text" id="subId" placeholder="مثال: 1312" inputmode="numeric">

    <button class="btn-search" onclick="searchBill()">استعلام عن البيانات</button>
</div>

<div class="container resultBox" id="resultPage">
    <div class="header">
        <img src="https://i.ibb.co/3M6r9f4/my-inquiries-logo.png" alt="إستعلاماتي" class="logo" style="width: 100px;">
    </div>
    <h2>بيانات الفاتورة</h2>
    <div class="data-row">
        <p>الاسم: <br><b id="custName"></b></p>
        <p>المبلغ المطلوب سداده: <br><span class="amount" id="custAmount"></span></p>
    </div>
    <button class="btn-gray" onclick="backToSearch()">رجوع للبحث</button>
</div>

<script>
    const DB = "https://question-738f7-default-rtdb.firebaseio.com";

    function updateBranches() {
        const type = document.getElementById("type").value;
        const branchSelect = document.getElementById("branch");
        branchSelect.innerHTML = '<option value="">-- اختر الفرع --</option>';
        
        let list = [];
        if (type === "Electricity") {
            list = ["حضرموت الوادي والصحراء", "حضرموت ساحل"];
        } else if (type === "Water") {
            list = ["فرع الشحر", "فرع سيؤن", "فرع تريم", "فرع القطن", "فرع المكلا", "فرع غيل باوزير"];
        }

        list.forEach(b => {
            let opt = document.createElement("option");
            opt.value = b; opt.innerText = b;
            branchSelect.appendChild(opt);
        });
    }

    async function searchBill() {
        const type = document.getElementById("type").value;
        const branch = document.getElementById("branch").value;
        const id = document.getElementById("subId").value.trim();
        
        if (!type || !branch || !id) return alert("يرجى إكمال البيانات");

        // تحويل الرابط للمسار الصحيح في قاعدة بياناتك
        const path = `${DB}/Bills/${encodeURIComponent(type)}/${encodeURIComponent(branch)}/${id}.json`;

        try {
            const res = await fetch(path);
            const data = await res.json();
            
            if (!data) return alert("لم يتم العثور على بيانات لهذا الرقم.");

            document.getElementById("custName").innerText = data.customerName;
            document.getElementById("custAmount").innerText = data.amount + " ريال";
            
            document.getElementById("searchPage").style.display = "none";
            document.getElementById("resultPage").style.display = "block";
        } catch (e) {
            alert("حدث خطأ في الاتصال بالخادم.");
        }
    }

    function backToSearch() {
        document.getElementById("resultPage").style.display = "none";
        document.getElementById("searchPage").style.display = "block";
    }
</script>
</body>
</html>
